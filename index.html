<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>海外服务使用指南</title>
  <meta name="description" content="Google、Apple ID、GPT 等海外服务账号注册、地区切换与订阅操作教程知识库。">
  <meta property="og:title" content="海外服务使用指南">
  <meta property="og:description" content="Google、Apple ID、GPT 等海外服务账号注册、地区切换与订阅操作教程知识库。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://haiwaiwiki.github.io/assets/tutorial-images/public/logo.png">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./">
      <span class="brand-mark"><img src="assets/tutorial-images/public/logo.png" alt="海外服务使用指南"></span>
      <strong>海外服务使用指南</strong>
    </a>
    <label class="topbar-search">
      <input class="search-input" type="search" placeholder="搜索：Google、Apple ID、GPT、手机号、验证码、订阅">
    </label>
  </header>

  <main class="page">
    <section id="home-view" class="home-view">
      <section class="directory-search">
        <label class="search-box">
          <input class="search-input" type="search" placeholder="搜索：Google、Apple ID、GPT、手机号、验证码、订阅">
        </label>
      </section>

      <section class="directory-block">
        <div class="directory-heading">
          <h2>按分类查找</h2>
        </div>
        <div id="category-grid" class="category-grid"></div>
      </section>

      <section class="directory-block">
        <div class="directory-heading">
          <h2>推荐先看</h2>
        </div>
        <section id="recommended-grid" class="recommended-grid"></section>
      </section>

      <section class="directory-block all-guides-block">
        <div class="filter-row" aria-label="教程筛选">
          <button class="filter-chip active" data-filter="all">全部</button>
          <button class="filter-chip" data-filter="status:available">可用</button>
          <button class="filter-chip" data-filter="status:draft">待完善</button>
          <button class="filter-chip" data-filter="status:high-risk">高风险提示</button>
          <button class="filter-chip" data-filter="status:not-recommended">不推荐</button>
          <button class="filter-chip" data-filter="difficulty:简单">简单</button>
          <button class="filter-chip" data-filter="difficulty:中等">中等</button>
          <button class="filter-chip" data-filter="risk:高">高风险</button>
        </div>

        <div class="section-title">
          <h1>全部教程</h1>
          <div class="title-tools">
            <span id="result-count">0 篇</span>
            <label class="sort-select">
              <span>排序</span>
              <select id="sort-select">
                <option value="latest">最新更新</option>
                <option value="recommended">推荐优先</option>
                <option value="risk">风险等级</option>
                <option value="category">分类</option>
              </select>
            </label>
            <div class="view-switch" aria-label="展示方式">
              <button class="view-button active" type="button" data-view="grid">卡片</button>
              <button class="view-button" type="button" data-view="list">列表</button>
            </div>
          </div>
        </div>

        <section id="card-grid" class="guide-results card-grid"></section>
      </section>
    </section>

    <article id="detail-view" class="detail-view" hidden></article>
  </main>

  <footer class="site-footer">
    <p>海外服务使用指南仅提供公开流程说明与风险避坑参考，不提供代充、接码、账号交易、规避风控或绕过平台规则等服务。</p>
  </footer>

  <script src="data/articles.js"></script>
  <script src="analytics-config.js"></script>
  <script src="analytics.js"></script>
  <script src="app.js"></script>
</body>
</html>
